name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: signalweave-desktop-linux-x64
          - os: windows-latest
            rid: win-x64
            artifact_name: signalweave-desktop-win-x64
          - os: macos-latest
            rid: osx-x64
            artifact_name: signalweave-desktop-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact_name: signalweave-desktop-osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SignalWeave.sln

      - name: Publish desktop
        run: dotnet publish src/SignalWeave.Desktop/SignalWeave.Desktop.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=false -p:PublishReadyToRun=false --output artifacts/${{ matrix.artifact_name }}

      - name: Archive desktop bundle
        shell: pwsh
        run: |
          $source = "artifacts/${{ matrix.artifact_name }}"
          $destination = "artifacts/${{ matrix.artifact_name }}.zip"
          if (Test-Path $destination) {
            Remove-Item $destination -Force
          }
          Compress-Archive -Path "$source/*" -DestinationPath $destination

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*.zip
