name: ci

on:
  push:
    branches:
      - main
      - classic-ui
      - modern-ui
  pull_request:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SignalWeave.sln

      - name: Build
        run: dotnet build SignalWeave.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/SignalWeave.Core.Tests/SignalWeave.Core.Tests.csproj --configuration Release --no-build
