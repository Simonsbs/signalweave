name: pages

on:
  push:
    branches:
      - main
      - modern-ui
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install wasm workload
        run: dotnet workload install wasm-tools

      - name: Publish browser app
        run: dotnet publish src/SignalWeave.Modern.Browser/SignalWeave.Modern.Browser.csproj -c Release -o browser-publish

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble Pages site
        run: |
          mkdir -p site-dist/app
          cp -R site/. site-dist/
          cp -R browser-publish/wwwroot/. site-dist/app/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
